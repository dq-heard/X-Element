<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- primary meta tags -->
    <title>Welcome to X-Element</title>
    <meta name="title" content="X-Element" />
    <meta
      name="description"
      content="Welcome to X-Element: Where Passion Meets X-Cellence in e-Sports"
    />

    <!-- favicon -->
    <link rel="shortcut icon" href="./logo.png" type="image/png" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&&display=swap"
      rel="stylesheet"
    />

    <!-- custom css link -->
    <link rel="stylesheet" href="./assets/css/style.css" />

    <!-- preload images -->
    <link rel="preload" as="image" href="./assets/images/cta-banner.png" />
    <link rel="preload" as="image" href="./assets/images/cta-banner-bg.png" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header active" data-header>
      <div class="container">
        <a href="index.html" class="logo">
          <img src="./logo.png" width="60" height="60" alt="X Element Home" />
          <p>X-Element</p>
        </a>

        <nav class="navbar" data-navbar>
          <ul class="navbar-list">
            <li class="navbar-item">
              <a href="index.html" class="navbar-link" data-nav-link>Home</a>
            </li>

            <li class="navbar-item">
              <a href="about.html" class="navbar-link" data-nav-link>About</a>
            </li>

            <li class="navbar-item dropdown">
              <button class="navbar-link dropdown-toggle" data-nav-link>
                Team
                
                <ion-icon name="caret-down-outline" class="link-arrow"></ion-icon>
              </button>

              <div class="dropdown-menu">
                <a href="roster.html" class="dropdown-item navbar-link">Roster</a>
                <a href="staff.html" class="dropdown-item navbar-link">Staff</a>
              </div>
            </li>

            <li class="navbar-item">
              <a href="gear.html" class="navbar-link" data-nav-link>Gear</a>
            </li>

            <li class="navbar-item">
              <a href="join.html" class="navbar-link join-link" data-nav-link
                >Join</a
              >
            </li>
          </ul>
        </nav>

        <a href="join.html" class="btn" data-btn>Join Our Team</a>

        <button
          class="nav-toggle-btn"
          aria-label="toggle menu"
          data-nav-toggler
        >
          <span class="line line-1"></span>
          <span class="line line-2"></span>
          <span class="line line-3"></span>
        </button>
      </div>
    </header>

  </body>
</html>
