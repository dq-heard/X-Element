<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- primary meta tags -->
    <title>X Element: Staff</title>
    <meta name="title" content="X-Element" />
    <meta
      name="description"
      content="Fostering a vibrant gaming community with camaraderie, integrity, and a unified passion."
    />

    <!-- favicon -->
    <link rel="shortcut icon" href="../../logo.png" type="image/png" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"
    />

    <!-- custom css link -->
    <link rel="stylesheet" href="../../team/roster/roster.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header active" data-header>
      <div class="container">
        <a href="../../home" class="logo">
          <img
            src="../../logo.png"
            width="60"
            height="60"
            alt="X Element Home"
          />
          <p>X&nbsp;Element</p>
        </a>

        <nav class="navbar" data-navbar>
          <ul class="navbar-list">
            <li class="navbar-item">
              <a href="../../home" class="navbar-link" data-nav-link>Home</a>
            </li>

            <li class="navbar-item">
              <a href="../../about" class="navbar-link" data-nav-link>About</a>
            </li>

            <li class="navbar-item dropdown">
              <button class="navbar-link dropdown-toggle" data-nav-link>
                Team

                <ion-icon
                  name="caret-down-outline"
                  class="link-arrow"
                ></ion-icon>
              </button>

              <div class="dropdown-menu">
                <a href="../roster" class="dropdown-item navbar-link">Roster</a>
                <a href="../staff" class="dropdown-item navbar-link">Staff</a>
              </div>
            </li>

            <li class="navbar-item">
              <a href="../../gear" class="navbar-link" data-nav-link>Gear</a>
            </li>

            <li class="navbar-item">
              <a href="../../join" class="navbar-link join-link" data-nav-link
                >Join</a
              >
            </li>
          </ul>
        </nav>

        <a href="../../join" class="btn" data-btn>Join Our Team</a>

        <button
          class="nav-toggle-btn"
          aria-label="toggle menu"
          data-nav-toggler
        >
          <span class="line line-1"></span>
          <span class="line line-2"></span>
          <span class="line line-3"></span>
        </button>
      </div>
    </header>

    <main></main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-bottom">
        <div class="container">
          <p class="copyright">
            ©
            <script type="text/javascript">
              document.write(new Date().getFullYear());
            </script>
            X&nbsp;Element LLC - All Rights Reserved.
          </p>
        </div>
      </div>
    </footer>

    <!-- CUSTOM CURSOR -->
    <div class="cursor" data-cursor></div>

    <!-- custom js link -->
    <script src="../../assets/js/script.js"></script>
  </body>
</html>
