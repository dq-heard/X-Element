<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- primary meta tags -->
    <title>Welcome to X Element</title>
    <meta name="title" content="X-Element" />
    <meta
      name="description"
      content="X Element: A Lifestyle-Sports-Media Company"
    />

    <!-- favicon -->
    <link rel="shortcut icon" href="./logo.png" type="image/png" />

    <!-- custom css link -->
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <!-- PRELOADER-->
    <div class="preloader">
      <img src="./assets/preloader.gif" alt="preloader" />
    </div>

    <!-- VIDEO -->
    <header>
      <video muted autoplay loop class="video-container">
        <source src="./assets/video.mp4" type="video/mp4" />
      </video>

      <a href="./home" class="btn redirect-btn">Visit Website</a>

      <button class="switch-btn">
        <span>Play</span>
        <span>Pause</span>
        <span class="switch"></span>
      </button>
    </header>

    <!-- custom js file link -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
